<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeSemanticsVault</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes slideUp {
            from { 
                opacity: 0; 
                transform: translateY(20px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .git-symbol {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 300px;
            opacity: 0.05;
            animation: rotate 25s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #378ADD 0%, #0F6E56 100%);
            color: white;
            padding: 2.5rem 2rem;
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .section {
            padding: 2rem;
            border-bottom: 1px solid #eee;
            animation: slideUp 0.6s ease-out;
        }

        .section:nth-child(2) { animation-delay: 0.1s; }
        .section:nth-child(3) { animation-delay: 0.2s; }
        .section:nth-child(4) { animation-delay: 0.3s; }
        .section:last-child { border-bottom: none; animation-delay: 0.4s; }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999;
            margin-bottom: 16px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s ease;
            margin-bottom: 12px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #378ADD;
            box-shadow: 0 0 0 3px rgba(55, 138, 221, 0.1);
            transform: translateY(-2px);
        }

        button {
            width: 100%;
            padding: 12px 24px;
            background: linear-gradient(135deg, #378ADD 0%, #0F6E56 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(55, 138, 221, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .status-card {
            background: #f9f9f9;
            padding: 16px;
            border-radius: 6px;
            text-align: center;
            border: 1px solid #eee;
            transition: all 0.3s ease;
        }

        .status-card:hover {
            border-color: #378ADD;
            transform: translateY(-2px);
        }

        .status-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
        }

        .status-number {
            font-size: 28px;
            font-weight: 600;
            color: #333;
        }

        .success-banner {
            background: #e8f5e9;
            border: 1px solid #4caf50;
            border-radius: 6px;
            padding: 12px;
            text-align: center;
            font-size: 13px;
            color: #2e7d32;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            animation: slideUp 0.6s ease-out 0.2s backwards;
        }

        .success-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #4caf50;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        .answer-box {
            background: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 16px;
            line-height: 1.6;
            font-size: 14px;
            animation: slideUp 0.6s ease-out 0.2s backwards;
        }

        .code-snippet {
            background: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #378ADD;
            border: 1px solid #eee;
        }

        .citation {
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 10px 12px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #378ADD;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .citation:hover {
            background: #f9f9f9;
            border-color: #378ADD;
            transform: translateX(4px);
        }

        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .metric {
            background: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 6px;
            padding: 16px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .metric:hover {
            border-color: #378ADD;
            transform: scale(1.05);
        }

        .metric-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 24px;
            font-weight: 600;
            color: #333;
        }

        .metric-value.high {
            color: #4caf50;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #999;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #378ADD;
            border-radius: 50%;
            animation: rotate 1s linear infinite;
        }

        .error {
            background: #ffebee;
            border: 1px solid #f44336;
            border-radius: 6px;
            padding: 12px;
            color: #c62828;
            font-size: 13px;
            margin-bottom: 16px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="git-symbol">
        <i class="fas fa-code-branch"></i>
    </div>

    <div class="container">
        <div class="header">
            <h1>CodeSemanticsVault</h1>
            <p>Ask questions about any GitHub repository</p>
        </div>

        <div class="section">
            <div class="section-title">Step 1: Index Repository</div>
            <input 
                type="text" 
                id="repoUrl" 
                placeholder="https://github.com/user/repository"
                value="https://github.com/requests/requests"
            />
            <button id="indexBtn">Index Repository</button>
        </div>

        <div class="section" id="statusSection" style="display: none;">
            <div class="status-grid">
                <div class="status-card">
                    <p class="status-label">Files Indexed</p>
                    <p class="status-number" id="filesCount">0</p>
                </div>
                <div class="status-card">
                    <p class="status-label">Code Chunks</p>
                    <p class="status-number" id="chunksCount">0</p>
                </div>
            </div>
            <div class="success-banner">
                <span class="success-dot"></span>
                <span>Repository indexed and ready</span>
            </div>
        </div>

        <div class="section" id="querySection" style="display: none;">
            <div class="section-title">Step 2: Ask a Question</div>
            <div id="errorMessage" class="error hidden"></div>
            <textarea 
                id="question" 
                placeholder="e.g., How does request routing work? What is the Session class?"
            ></textarea>
            <button id="queryBtn">Search & Generate Answer</button>
        </div>

        <div class="section" id="answerSection" style="display: none;">
            <div class="section-title">Answer</div>
            
            <div id="loadingIndicator" class="loading hidden">
                <div class="spinner"></div>
                <p>Generating answer...</p>
            </div>

            <div id="answerContent" class="hidden">
                <div class="answer-box" id="answerText"></div>

                <div id="citationsDiv">
                    <p style="font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #999; margin-bottom: 12px;">📍 Source Code</p>
                    <div id="citationsList"></div>
                </div>

                <div class="metrics">
                    <div class="metric">
                        <p class="metric-label">Confidence Score</p>
                        <p class="metric-value high" id="confidenceScore">0%</p>
                    </div>
                    <div class="metric">
                        <p class="metric-label">Retrieved Chunks</p>
                        <p class="metric-value" id="chunksRetrieved">0</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';
        let currentCollection = null;

        document.getElementById('indexBtn').addEventListener('click', indexRepository);
        document.getElementById('queryBtn').addEventListener('click', queryRepository);

        async function indexRepository() {
            const url = document.getElementById('repoUrl').value;
            if (!url) {
                alert('Please enter a repository URL');
                return;
            }

            const btn = document.getElementById('indexBtn');
            btn.disabled = true;
            btn.textContent = 'Indexing...';

            try {
                const response = await fetch(`${API_URL}/index`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        github_url: url,
                        collection_name: url.split('/').pop().replace('.git', '')
                    })
                });

                if (!response.ok) throw new Error(await response.text());
                const data = await response.json();

                currentCollection = data.collection;
                document.getElementById('filesCount').textContent = data.files_indexed;
                document.getElementById('chunksCount').textContent = data.chunks_created;
                document.getElementById('statusSection').style.display = 'block';
                document.getElementById('querySection').style.display = 'block';

                btn.textContent = '✓ Repository Indexed';
            } catch (error) {
                alert('Indexing failed: ' + error.message);
            } finally {
                btn.disabled = false;
            }
        }

        async function queryRepository() {
            const question = document.getElementById('question').value;
            if (!question) {
                alert('Please ask a question');
                return;
            }

            if (!currentCollection) {
                alert('Please index a repository first');
                return;
            }

            const btn = document.getElementById('queryBtn');
            btn.disabled = true;
            btn.textContent = 'Searching...';

            document.getElementById('loadingIndicator').classList.remove('hidden');
            document.getElementById('answerSection').style.display = 'block';
            document.getElementById('answerContent').classList.add('hidden');

            try {
                const response = await fetch(`${API_URL}/query`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question: question,
                        collection_name: currentCollection
                    })
                });

                if (!response.ok) throw new Error(await response.text());
                const data = await response.json();

                document.getElementById('answerText').innerHTML = data.answer
                    .replace(/`([^`]+)`/g, '<span class="code-snippet">$1</span>');
                
                const citationsList = document.getElementById('citationsList');
                citationsList.innerHTML = data.citations.map(c => 
                    `<div class="citation">${c.filename}:${c.start_line}-${c.end_line}</div>`
                ).join('');

                document.getElementById('confidenceScore').textContent = Math.round(data.confidence * 100) + '%';
                document.getElementById('chunksRetrieved').textContent = data.retrieved_chunks;

                document.getElementById('loadingIndicator').classList.add('hidden');
                document.getElementById('answerContent').classList.remove('hidden');
            } catch (error) {
                document.getElementById('errorMessage').textContent = 'Error: ' + error.message;
                document.getElementById('errorMessage').classList.remove('hidden');
                document.getElementById('loadingIndicator').classList.add('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Search & Generate Answer';
            }
        }
    </script>
</body>
</html>
